<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Регистрация — Мафия на Тверской</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="images/icon-192.png">
</head>
<body>

    <header>
        <table width="100%" cellpadding="10">
            <tr>
                <td width="200"><strong>🕵️ Мафия на Тверской</strong></td>
                <td align="right">
                    <a href="index.html">Главная</a> &nbsp;|&nbsp;
                    <a href="register.html">Регистрация</a> &nbsp;|&nbsp;
                    <a href="reviews.html">Отзывы</a>
                </td>
            </tr>
        </table>
        <hr>
    </header>

    <main>
        <section>
            <table width="100%" cellpadding="20">
                <tr>
                    <td align="center">
                        <h1>📝 Записаться на игру</h1>
                        <p>Заполните форму, и мы свяжемся с вами для подтверждения</p>
                    </td>
                </tr>
            </table>
        </section>

        <hr>

        <section>
            <table width="100%" cellpadding="10">
                <tr>
                    <td align="center">
                        <form action="#" method="POST">
                            <table width="60%" cellpadding="10">
                                <tr>
                                    <td align="right"><strong>Имя:</strong></td>
                                    <td align="left"><input type="text" name="name" size="30" placeholder="Ваше имя"></td>
                                </tr>
                                <tr>
                                    <td align="right"><strong>Телефон:</strong></td>
                                    <td align="left"><input type="tel" name="phone" size="30" placeholder="+7 (999) 123-45-67"></td>
                                </tr>
                                <tr>
                                    <td align="right"><strong>Формат игры:</strong></td>
                                    <td align="left">
                                        <select name="format">
                                            <option value="classic">Классика (1500 ₽)</option>
                                            <option value="vip">VIP (2500 ₽)</option>
                                            <option value="corp">Корпоратив (от 1200 ₽/чел)</option>
                                        </select>
                                    </td>
                                </tr>
                                <tr>
                                    <td align="right"><strong>Дата игры:</strong></td>
                                    <td align="left"><input type="date" name="game_date"></td>
                                </tr>
                                <tr>
                                    <td colspan="2" align="center">
                                        <br>
                                        <button type="submit" class="btn">Записаться</button>
                                    </td>
                                </tr>
                            </table>
                        </form>
                    </td>
                </tr>
            </table>
        </section>
    </main>

    <hr>

    <footer>
        <table width="100%" cellpadding="10">
            <tr>
                <td align="center">
                    🕵️ Мафия на Тверской © 2026 &nbsp;|&nbsp;
                    Официальный организатор
                </td>
            </tr>
        </table>
    </footer>

</body>
</html>
